version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: Tusk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build: ./productivity
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/Tusk
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_CORS_ALLOWED-ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      - db
volumes:
  pgdata:

